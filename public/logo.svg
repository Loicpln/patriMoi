<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>Patri'Me</title>
  <defs>

    <linearGradient id="goldLine" x1="108" y1="399" x2="412" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#B86010"/>
      <stop offset="50%"  stop-color="#F0A020"/>
      <stop offset="100%" stop-color="#FFE84E"/>
    </linearGradient>

    <linearGradient id="areaMain" x1="256" y1="120" x2="256" y2="412" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#F09A18" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#F09A18" stop-opacity="0.02"/>
    </linearGradient>

    <linearGradient id="blueLine" x1="108" y1="407" x2="412" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1C3A7C"/>
      <stop offset="100%" stop-color="#479FF8"/>
    </linearGradient>

    <linearGradient id="areaBlue" x1="256" y1="300" x2="256" y2="412" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#479FF8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#479FF8" stop-opacity="0.02"/>
    </linearGradient>

    <radialGradient id="bgGrad" cx="50%" cy="40%" r="66%">
      <stop offset="0%"   stop-color="#1d2233"/>
      <stop offset="100%" stop-color="#090c14"/>
    </radialGradient>

    <filter id="glowGold" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glowBlue" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- Fond carré plein -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Grille -->
  <g stroke="#192040" stroke-width="1" stroke-dasharray="5,8" opacity="0.85">
    <line x1="108" y1="337" x2="412" y2="337"/>
    <line x1="108" y1="263" x2="412" y2="263"/>
    <line x1="108" y1="188" x2="412" y2="188"/>
    <line x1="192" y1="104" x2="192" y2="412"/>
    <line x1="302" y1="104" x2="302" y2="412"/>
  </g>

  <!-- Axes -->
  <line x1="108" y1="104" x2="108" y2="412" stroke="#2a3660" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="108" y1="412" x2="416" y2="412" stroke="#2a3660" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Marques axe Y -->
  <g stroke="#2a3660" stroke-width="2" stroke-linecap="round">
    <line x1="100" y1="337" x2="116" y2="337"/>
    <line x1="100" y1="263" x2="116" y2="263"/>
    <line x1="100" y1="188" x2="116" y2="188"/>
  </g>

  <!-- Zone sous courbe bleue -->
  <path d="M 108,407 C 205,407 277,384 412,300 L 412,412 L 108,412 Z"
        fill="url(#areaBlue)"/>

  <!-- Courbe bleue (livrets) -->
  <path d="M 108,407 C 205,407 277,384 412,300"
        fill="none" stroke="url(#blueLine)"
        stroke-width="5" stroke-linecap="round" opacity="0.88"/>

  <!-- Zone sous courbe or -->
  <path d="M 108,399
           C 181,399 225,346 269,274
           C 315,199 365,148 412,120
           L 412,412 L 108,412 Z"
        fill="url(#areaMain)"/>

  <!-- Courbe or (investissements) -->
  <path d="M 108,399
           C 181,399 225,346 269,274
           C 315,199 365,148 412,120"
        fill="none" stroke="url(#goldLine)"
        stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Points — courbe or -->
  <circle cx="108" cy="399" r="7"  fill="#B06010" stroke="#0d1020" stroke-width="2.5"/>
  <circle cx="192" cy="366" r="8"  fill="#D08818" stroke="#0d1020" stroke-width="2.5"/>
  <circle cx="269" cy="274" r="9"  fill="#F0A020" stroke="#0d1020" stroke-width="2.5"/>
  <circle cx="354" cy="170" r="9"  fill="#F5C82A" stroke="#0d1020" stroke-width="2.5"/>
  <circle cx="412" cy="120" r="12" fill="#FFE84E" stroke="#0d1020" stroke-width="2.5"
          filter="url(#glowGold)"/>

  <!-- Point final — courbe bleue -->
  <circle cx="412" cy="300" r="9"  fill="#479FF8" stroke="#0d1020" stroke-width="2"
          filter="url(#glowBlue)"/>

  <!-- Flèche montante -->
  <g stroke="#FFE84E" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="394,98 412,80 430,98"/>
    <line x1="412" y1="80" x2="412" y2="116"/>
  </g>

</svg>
